<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checa</title>
<style>
:root{--bg:#0f1115;--card:#171a21;--line:#262b36;--txt:#e8eaed;--dim:#9aa3b2;--ac:#4f8cff}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font:16px/1.5 -apple-system,Roboto,sans-serif;padding:20px 16px 60px;max-width:640px;margin-inline:auto}
h1{font-size:20px;margin:0 0 4px}
.sub{color:var(--dim);font-size:13px;margin-bottom:22px}
label{display:block;font-size:13px;color:var(--dim);margin:16px 0 6px}
input,textarea{width:100%;background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:12px;font:inherit;font-size:15px}
textarea{min-height:110px}
button{width:100%;margin-top:18px;padding:14px;border:0;border-radius:10px;background:var(--ac);color:#fff;font:inherit;font-weight:600;font-size:16px}
.sec{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:24px;display:none}
.sec.on{display:block}
#saida{white-space:pre-wrap}
#fontes{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);font-size:13px;color:var(--dim)}
#fontes a{color:var(--ac);text-decoration:none;display:block;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cp{background:#2a2f3a;margin-top:14px;font-size:14px;padding:11px}
.erro{color:#ff8080}
details{margin-top:26px}
summary{color:var(--dim);font-size:13px}
</style>
</head>
<body>
<h1>Checa</h1>
<div class="sub">Cole um comentário. Recebe o dado, com fonte.</div>

<label for="comentario">Comentário</label>
<textarea id="comentario" placeholder="Cole aqui o comentário"></textarea>

<label for="pergunta">Sua pergunta (opcional)</label>
<input id="pergunta" placeholder="isso é verdade?">

<button id="btn" onclick="checar()">Checar</button>

<div class="sec" id="resultado">
  <div id="saida"></div>
  <div id="fontes"></div>
  <button class="cp" onclick="copiar()">Copiar resposta</button>
</div>

<details>
  <summary>Configurar chave da API</summary>
  <label for="chave">Chave do Google AI Studio</label>
  <input id="chave" type="password" placeholder="cole a chave aqui" oninput="gravar(this.value)">
</details>

<script src="prompt.js"></script>
<script>
var mem = "";

function gravar(v){
  mem = v.trim();
  try { localStorage.setItem("k", mem); } catch(e){}
}
function lerChave(){
  try { return localStorage.getItem("k") || mem; } catch(e){ return mem; }
}
function el(id){ return document.getElementById(id); }

function erro(m){
  el("saida").textContent = m;
  el("saida").className = "erro";
  el("fontes").innerHTML = "";
  el("resultado").className = "sec on";
}

function checar(){
  var chave = lerChave();
  var c = el("comentario").value.trim();
  var p = el("pergunta").value.trim();

  if(!chave){ erro("Falta a chave. Abra Configurar chave da API."); return; }
  if(!c){ erro("Cole um comentário primeiro."); return; }

  el("btn").textContent = "Checando...";

  var hoje = new Date().toLocaleDateString("pt-BR");
  var texto = "Hoje é " + hoje + ".\n\nComentário: \"" + c + "\"";
  if(p){ texto += "\n\nPergunta do usuário: " + p; }

  var url = "https://generativelanguage.googleapis.com/v1beta/models/" + MODELO + ":generateContent?key=" + chave;

  fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: INSTRUCAO }] },
      contents: [{ role: "user", parts: [{ text: texto }] }],
      tools: [{ google_search: {} }],
      generationConfig: { temperature: 0.3 }
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    el("btn").textContent = "Checar";
    if(d.error){ erro(d.error.message); return; }
    var cand = d.candidates && d.candidates[0];
    if(!cand){ erro("Não veio resposta."); return; }
    var partes = (cand.content && cand.content.parts) || [];
    var resp = "";
    for(var i = 0; i < partes.length; i++){ resp += partes[i].text || ""; }
    if(!resp){ erro("Não veio resposta."); return; }
    mostrar(resp.trim(), cand.groundingMetadata);
  })
  .catch(function(e){
    el("btn").textContent = "Checar";
    erro("Falha: " + e.message);
  });
}

function mostrar(txt, g){
  el("saida").textContent = txt;
  el("saida").className = "";
  var f = el("fontes");
  var chunks = (g && g.groundingChunks) || [];
  f.innerHTML = "";
  if(chunks.length){
    f.innerHTML = "<div>Fontes consultadas</div>";
    var vistos = {};
    for(var i = 0; i < chunks.length; i++){
      var w = chunks[i].web;
      if(!w || !w.title || vistos[w.title]) continue;
      vistos[w.title] = 1;
      var a = document.createElement("a");
      a.href = w.uri; a.target = "_blank"; a.textContent = w.title;
      f.appendChild(a);
    }
  } else {
    f.innerHTML = "<div>Atenção: nenhuma busca foi feita.</div>";
  }
  el("resultado").className = "sec on";
}

function copiar(){
  var t = el("saida").textContent;
  if(navigator.clipboard){ navigator.clipboard.writeText(t); }
}

try { el("chave").value = lerChave(); } catch(e){}
</script>
</body>
</html>
